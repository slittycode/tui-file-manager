[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
pythonpath = .
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests

# Coverage options (only applied when pytest-cov is installed)
[pytest-cov]
cov = app filesystem_service filterable_tree
cov-report = term-missing,html
